<html>
    <head>
        <title>Mini Store</title>
        <link rel="stylesheet" type="text/css" href="/static/style.css">
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f8f9fa;
                margin: 0;
            }
            .store-header {
                text-align: center;
                margin: 30px 0;
                color: #333;
            }
            .product-container {
                display: flex;
                justify-content: center;
                gap: 30px;
                flex-wrap: wrap;
                padding: 20px;
            }
            
            /* Card Animation & Styling */
            .product-card {
                background: white;
                border: 1px solid #eaeaea;
                border-radius: 12px;
                padding: 20px;
                width: 250px;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
                transform: translateY(0);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            .product-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            }
            
            /* Product Image Placeholder */
            .product-image {
                width: 100%;
                height: 180px;
                background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
                border-radius: 8px;
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 50px;
                transition: transform 0.3s ease;
            }
            .product-card:hover .product-image {
                transform: scale(1.05);
            }
            
            /* Product Details */
            .product-title {
                font-size: 1.25em;
                margin: 10px 0;
                color: #2c3e50;
            }
            .product-price {
                font-size: 1.6em;
                color: #e74c3c;
                font-weight: bold;
                margin-bottom: 15px;
            }
            
            /* Button Animation */
            .buy-btn {
                background-color: #3498db;
                color: white;
                border: none;
                padding: 12px 25px;
                border-radius: 25px;
                cursor: pointer;
                font-size: 1.1em;
                font-weight: bold;
                transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.3s ease;
            }
            .buy-btn:hover {
                background-color: #2980b9;
                box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4);
            }
            .buy-btn:active {
                transform: scale(0.95);
            }
        </style>
    </head>
    
    <body>
        {% include 'menu.html' %}
        
        <h1 class="store-header">Mini E-Commerce Store</h1>
        
        <div class="product-container">
            <div class="product-card">
                <div class="product-image">👟</div>
                <div class="product-title">Running Shoes</div>
                <div class="product-price">$49.99</div>
                <button class="buy-btn" onclick="alert('Running Shoes added to your cart!')">Buy Now</button>
            </div>
            
            <div class="product-card">
                <div class="product-image">⌚</div>
                <div class="product-title">Smart Watch</div>
                <div class="product-price">$129.99</div>
                <button class="buy-btn" onclick="alert('Smart Watch added to your cart!')">Buy Now</button>
            </div>
            
            <div class="product-card">
                <div class="product-image">🎧</div>
                <div class="product-title">Wireless Earbuds</div>
                <div class="product-price">$39.99</div>
                <button class="buy-btn" onclick="alert('Wireless Earbuds added to your cart!')">Buy Now</button>
            </div>
        </div>
    </body>
</html>
