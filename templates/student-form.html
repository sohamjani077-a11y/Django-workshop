<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ title }}</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="name">Name</label><br>
        <input id="name" name="name" type="text" value="{{ student.name|default:'' }}" required><br><br>

        <label for="mobile">Mobile</label><br>
        <input id="mobile" name="mobile" type="text" value="{{ student.mobile|default:'' }}" required><br><br>

        <label for="email">Email</label><br>
        <input id="email" name="email" type="email" value="{{ student.email|default:'' }}" required><br><br>

        <label for="address">Address</label><br>
        <input id="address" name="address" type="text" value="{{ student.address|default:'' }}" required><br><br>

        <button type="submit">Save</button>
        <a href="/students/">Cancel</a>
    </form>
</body>
</html>
